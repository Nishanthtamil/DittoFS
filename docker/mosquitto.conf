# Mosquitto MQTT broker configuration for DittoFS testing

# Basic settings
listener 1883
listener 9001
protocol websockets

# Allow anonymous connections for testing
allow_anonymous true

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_type debug

# Persistence
persistence true
persistence_location /mosquitto/data/

# Connection settings
max_connections 1000
max_inflight_messages 100
max_queued_messages 1000

# Security (relaxed for testing)
password_file /dev/null