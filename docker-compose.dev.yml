# Docker Compose configuration for DittoFS development environment
version: '3.8'

services:
  # Main development container
  dittofs-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: dittofs-dev
    volumes:
      # Mount source code for live editing
      - .:/workspace
      # Persist virtual environment
      - dittofs-venv:/workspace/.ditto
      # Persist development data
      - dittofs-dev-data:/home/developer/.dittofs
      # Mount Docker socket for Docker-in-Docker (optional)
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      # DittoFS default ports
      - "8080:8080"  # Discovery port
      - "8081:8081"  # Sync port
      - "8082:8082"  # Web interface
      # Additional development ports
      - "3000:3000"  # Frontend development
      - "5000:5000"  # API development
    environment:
      - DITTOFS_ENV=development
      - DITTOFS_LOG_LEVEL=DEBUG
      - DITTOFS_CONFIG_PATH=/home/developer/.dittofs/dev/config.toml
    networks:
      - dittofs-dev-network
    # Enable privileged mode for FUSE
    privileged: true
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    stdin_open: true
    tty: true

  # Test database for integration tests
  test-db:
    image: postgres:15-alpine
    container_name: dittofs-test-db
    environment:
      POSTGRES_DB: dittofs_test
      POSTGRES_USER: dittofs_test
      POSTGRES_PASSWORD: dittofs_test_password
    ports:
      - "5432:5432"
    volumes:
      - dittofs-test-db-data:/var/lib/postgresql/data
    networks:
      - dittofs-dev-network

  # Redis for caching and message queuing in tests
  test-redis:
    image: redis:7-alpine
    container_name: dittofs-test-redis
    ports:
      - "6379:6379"
    volumes:
      - dittofs-test-redis-data:/data
    networks:
      - dittofs-dev-network

  # MQTT broker for testing MQTT transport
  test-mqtt:
    image: eclipse-mosquitto:2
    container_name: dittofs-test-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - dittofs-test-mqtt-data:/mosquitto/data
      - dittofs-test-mqtt-logs:/mosquitto/log
    networks:
      - dittofs-dev-network

  # Multi-peer testing environment
  dittofs-peer1:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: dittofs-peer1
    volumes:
      - .:/workspace
      - dittofs-peer1-data:/home/developer/.dittofs
    environment:
      - DITTOFS_ENV=testing
      - DITTOFS_PEER_ID=peer1
      - DITTOFS_DISCOVERY_PORT=8080
      - DITTOFS_SYNC_PORT=8081
    networks:
      - dittofs-dev-network
    privileged: true
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    profiles:
      - testing

  dittofs-peer2:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: dittofs-peer2
    volumes:
      - .:/workspace
      - dittofs-peer2-data:/home/developer/.dittofs
    environment:
      - DITTOFS_ENV=testing
      - DITTOFS_PEER_ID=peer2
      - DITTOFS_DISCOVERY_PORT=8083
      - DITTOFS_SYNC_PORT=8084
    networks:
      - dittofs-dev-network
    privileged: true
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    profiles:
      - testing

  dittofs-peer3:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: dittofs-peer3
    volumes:
      - .:/workspace
      - dittofs-peer3-data:/home/developer/.dittofs
    environment:
      - DITTOFS_ENV=testing
      - DITTOFS_PEER_ID=peer3
      - DITTOFS_DISCOVERY_PORT=8085
      - DITTOFS_SYNC_PORT=8086
    networks:
      - dittofs-dev-network
    privileged: true
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    profiles:
      - testing

networks:
  dittofs-dev-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  dittofs-venv:
  dittofs-dev-data:
  dittofs-test-db-data:
  dittofs-test-redis-data:
  dittofs-test-mqtt-data:
  dittofs-test-mqtt-logs:
  dittofs-peer1-data:
  dittofs-peer2-data:
  dittofs-peer3-data: