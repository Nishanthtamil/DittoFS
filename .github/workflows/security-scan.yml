name: Security Scanning

on:
  schedule:
    # Run comprehensive security scans daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:  # Allow manual triggering
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'requirements*.txt'

env:
  PYTHON_VERSION: '3.11'

jobs:
  comprehensive-security-scan:
    name: Comprehensive Security Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install security tools and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,all]
          pip install bandit[toml] safety pip-audit semgrep cyclonedx-bom
      
      - name: Generate Software Bill of Materials (SBOM)
        run: |
          cyclonedx-py -o dittofs-sbom.json
          cyclonedx-py -o dittofs-sbom.xml --format xml
      
      - name: Run Bandit security analysis
        run: |
          bandit -r src/ -f json -o bandit-detailed.json
          bandit -r src/ -f txt -o bandit-detailed.txt
          bandit -r src/ -f sarif -o bandit-results.sarif
        continue-on-error: true
      
      - name: Run Safety dependency vulnerability scan
        run: |
          safety check --json --output safety-detailed.json
          safety check --output safety-detailed.txt
          safety audit --json --output safety-audit.json
        continue-on-error: true
      
      - name: Run pip-audit comprehensive scan
        run: |
          pip-audit --format=json --output=pip-audit-detailed.json
          pip-audit --format=cyclonedx-json --output=pip-audit-sbom.json
          pip-audit --format=sarif --output=pip-audit-results.sarif
          pip-audit --output=pip-audit-detailed.txt
        continue-on-error: true
      
      - name: Run Semgrep static analysis
        run: |
          semgrep --config=auto src/ --json --output=semgrep-detailed.json
          semgrep --config=auto src/ --sarif --output=semgrep-results.sarif
          semgrep --config=auto src/ --output=semgrep-detailed.txt
        continue-on-error: true
      
      - name: Run CodeQL analysis
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
      
      - name: Upload SARIF results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: |
            bandit-results.sarif
            pip-audit-results.sarif
            semgrep-results.sarif
        continue-on-error: true
      
      - name: Generate security summary report
        run: |
          python -c "
          import json
          import os
          
          def load_json_safe(filename):
              try:
                  with open(filename, 'r') as f:
                      return json.load(f)
              except:
                  return {}
          
          # Load security scan results
          bandit_results = load_json_safe('bandit-detailed.json')
          safety_results = load_json_safe('safety-detailed.json')
          pip_audit_results = load_json_safe('pip-audit-detailed.json')
          semgrep_results = load_json_safe('semgrep-detailed.json')
          
          # Generate summary
          summary = {
              'scan_date': '$(date -u +\"%Y-%m-%d %H:%M:%S UTC\")',
              'bandit': {
                  'issues_found': len(bandit_results.get('results', [])),
                  'high_severity': len([r for r in bandit_results.get('results', []) if r.get('issue_severity') == 'HIGH']),
                  'medium_severity': len([r for r in bandit_results.get('results', []) if r.get('issue_severity') == 'MEDIUM'])
              },
              'safety': {
                  'vulnerabilities_found': len(safety_results.get('vulnerabilities', [])),
                  'packages_scanned': len(safety_results.get('scanned_packages', []))
              },
              'pip_audit': {
                  'vulnerabilities_found': len(pip_audit_results.get('vulnerabilities', [])),
                  'packages_scanned': len(pip_audit_results.get('dependencies', []))
              },
              'semgrep': {
                  'findings': len(semgrep_results.get('results', [])),
                  'errors': len(semgrep_results.get('errors', []))
              }
          }
          
          with open('security-summary.json', 'w') as f:
              json.dump(summary, f, indent=2)
          
          print('Security scan summary generated')
          "
      
      - name: Create security report
        run: |
          echo '# 🔒 Security Scan Report' > security-report.md
          echo '' >> security-report.md
          echo '**Scan Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")' >> security-report.md
          echo '' >> security-report.md
          echo '## Summary' >> security-report.md
          echo '' >> security-report.md
          
          if [ -f security-summary.json ]; then
            python -c "
            import json
            with open('security-summary.json', 'r') as f:
                summary = json.load(f)
            
            print('| Tool | Issues Found | High Severity | Medium Severity |')
            print('|------|--------------|---------------|-----------------|')
            print(f'| Bandit | {summary[\"bandit\"][\"issues_found\"]} | {summary[\"bandit\"][\"high_severity\"]} | {summary[\"bandit\"][\"medium_severity\"]} |')
            print(f'| Safety | {summary[\"safety\"][\"vulnerabilities_found\"]} | - | - |')
            print(f'| pip-audit | {summary[\"pip_audit\"][\"vulnerabilities_found\"]} | - | - |')
            print(f'| Semgrep | {summary[\"semgrep\"][\"findings\"]} | - | - |')
            " >> security-report.md
          fi
          
          echo '' >> security-report.md
          echo '## Recommendations' >> security-report.md
          echo '' >> security-report.md
          echo '- Review all high and medium severity findings' >> security-report.md
          echo '- Update vulnerable dependencies identified by Safety and pip-audit' >> security-report.md
          echo '- Address code quality issues identified by Semgrep' >> security-report.md
          echo '- Implement additional security controls as needed' >> security-report.md
      
      - name: Upload comprehensive security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: comprehensive-security-reports
          path: |
            bandit-detailed.*
            safety-detailed.*
            safety-audit.json
            pip-audit-detailed.*
            pip-audit-sbom.json
            semgrep-detailed.*
            dittofs-sbom.*
            security-summary.json
            security-report.md
            *.sarif
          retention-days: 90
      
      - name: Comment security summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            if (fs.existsSync('security-report.md')) {
              const report = fs.readFileSync('security-report.md', 'utf8');
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: report
              });
            }

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, GPL-3.0
          deny-licenses: GPL-2.0, LGPL-2.1