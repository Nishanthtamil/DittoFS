name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.11'

jobs:
  code-formatting:
    name: Code Formatting Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install formatting tools
        run: |
          python -m pip install --upgrade pip
          pip install black isort
      
      - name: Check code formatting with Black
        run: |
          black --check --diff --color src/ tests/
      
      - name: Check import sorting with isort
        run: |
          isort --check-only --diff --color src/ tests/

  linting:
    name: Code Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 flake8-bugbear flake8-docstrings flake8-import-order
          pip install -e .[dev]
      
      - name: Run Flake8 linting
        run: |
          flake8 src/ tests/ --statistics --tee --output-file=flake8-report.txt
      
      - name: Upload linting report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linting-report
          path: flake8-report.txt
          retention-days: 30

  type-checking:
    name: Type Checking
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install type checking tools
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-all
          pip install -e .[dev]
      
      - name: Run MyPy type checking
        run: |
          mypy src/ --html-report mypy-report --txt-report mypy-report --cobertura-xml-report mypy-report
      
      - name: Upload type checking report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: type-checking-report
          path: mypy-report/
          retention-days: 30

  documentation-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install documentation tools
        run: |
          python -m pip install --upgrade pip
          pip install pydocstyle
          pip install -e .[dev]
      
      - name: Check docstring style
        run: |
          pydocstyle src/ --convention=google --add-ignore=D100,D104
      
      - name: Check README and documentation files
        run: |
          # Check that README exists and is not empty
          if [ ! -s README.md ]; then
            echo "❌ README.md is missing or empty"
            exit 1
          fi
          
          # Check for basic documentation sections
          if ! grep -q "# DittoFS" README.md; then
            echo "❌ README.md missing main title"
            exit 1
          fi
          
          echo "✅ Documentation checks passed"

  complexity-analysis:
    name: Code Complexity Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install complexity analysis tools
        run: |
          python -m pip install --upgrade pip
          pip install radon xenon mccabe
          pip install -e .[dev]
      
      - name: Run complexity analysis with Radon
        run: |
          radon cc src/ --min B --show-complexity --total-average
          radon mi src/ --min B --show --multi
      
      - name: Run complexity check with Xenon
        run: |
          xenon --max-absolute B --max-modules B --max-average A src/
        continue-on-error: true

  code-quality-summary:
    name: Code Quality Summary
    runs-on: ubuntu-latest
    needs: [code-formatting, linting, type-checking, documentation-check, complexity-analysis]
    if: always()
    
    steps:
      - name: Generate quality summary
        run: |
          echo "## 📊 Code Quality Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Formatting | ${{ needs.code-formatting.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linting | ${{ needs.linting.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Checking | ${{ needs.type-checking.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ needs.documentation-check.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Complexity | ${{ needs.complexity-analysis.result == 'success' && '✅ Passed' || '⚠️ Check Required' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.code-formatting.result }}" != "success" ]]; then
            echo "❌ Code formatting issues detected. Run 'black src/ tests/' to fix." >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ "${{ needs.linting.result }}" != "success" ]]; then
            echo "❌ Linting issues detected. Check the linting report for details." >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ "${{ needs.type-checking.result }}" != "success" ]]; then
            echo "❌ Type checking issues detected. Check the MyPy report for details." >> $GITHUB_STEP_SUMMARY
          fi