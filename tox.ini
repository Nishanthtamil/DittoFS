# Tox configuration for DittoFS
# Run with: tox

[tox]
envlist = py{39,310,311,312}, lint, security, docs
isolated_build = true
skip_missing_interpreters = true

[testenv]
# Install package in development mode with test dependencies
deps = 
    -e.[dev,all]
    
# Set environment variables
setenv =
    PYTHONPATH = {toxinidir}/src
    COVERAGE_FILE = {toxworkdir}/.coverage.{envname}
    
# Run tests with coverage
commands =
    python -m pytest tests/ \
        --cov=src/dittofs \
        --cov-report=term-missing \
        --cov-report=html:{toxworkdir}/htmlcov-{envname} \
        --cov-report=xml:{toxworkdir}/coverage-{envname}.xml \
        --junit-xml={toxworkdir}/junit-{envname}.xml \
        {posargs}

[testenv:lint]
deps = 
    black
    isort
    flake8
    flake8-bugbear
    flake8-docstrings
    flake8-import-order
    mypy
    types-all
    pydocstyle
    
commands =
    black --check --diff src/ tests/
    isort --check-only --diff src/ tests/
    flake8 src/ tests/
    mypy src/
    pydocstyle src/

[testenv:security]
deps =
    bandit[toml]
    safety
    pip-audit
    
commands =
    bandit -r src/
    safety check
    pip-audit

[testenv:format]
deps =
    black
    isort
    
commands =
    black src/ tests/
    isort src/ tests/

[testenv:docs]
deps =
    sphinx
    sphinx-rtd-theme
    sphinx-autodoc-typehints
    
commands =
    sphinx-build -b html docs docs/_build/html

[testenv:coverage]
deps = 
    coverage[toml]
    
commands =
    coverage combine {toxworkdir}/.coverage.*
    coverage report
    coverage html -d {toxworkdir}/htmlcov-combined
    coverage xml -o {toxworkdir}/coverage-combined.xml

[testenv:benchmark]
deps = 
    -e.[dev,all]
    pytest-benchmark
    
commands =
    python -m pytest tests/ -m benchmark \
        --benchmark-json={toxworkdir}/benchmark-results.json

[testenv:integration]
deps = 
    -e.[dev,all]
    
commands =
    python -m pytest tests/ -m integration \
        --timeout=300 \
        {posargs}

[testenv:property]
deps = 
    -e.[dev,all]
    hypothesis
    
setenv =
    {[testenv]setenv}
    HYPOTHESIS_MAX_EXAMPLES = 100
    
commands =
    python -m pytest tests/ -m property \
        --timeout=300 \
        {posargs}

[testenv:clean]
deps = coverage
skip_install = true
commands = 
    coverage erase
    python -c "import shutil; shutil.rmtree('htmlcov', ignore_errors=True)"
    python -c "import shutil; shutil.rmtree('.pytest_cache', ignore_errors=True)"
    python -c "import shutil; shutil.rmtree('.mypy_cache', ignore_errors=True)"

# Configuration sections
[flake8]
max-line-length = 88
extend-ignore = E203, W503, E501
exclude = .git,__pycache__,.pytest_cache,.mypy_cache,.tox,.venv,build,dist,*.egg-info,htmlcov

[coverage:run]
source = src
omit = 
    */tests/*
    */test_*
    */__pycache__/*
    */site-packages/*
    */hello_dittofs.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod